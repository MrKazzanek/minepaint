<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinePaint Documentation</title>
    <link rel="icon" type="image/x-icon" href="app_icon.png">
    
    <!-- Główne style z index.html i style dla dokumentacji -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="docstyle.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Press+Start+2P&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="docs-body">

    <!-- Header -->
    <header id="navbar" class="compact-header docs-header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="MinePaint Logo">
                <span class="pixel-text">MinePaint Docs</span>
            </a>
            
            <nav class="nav-right">
                <a href="index.html" class="btn btn-outline dark btn-sm"><i class="fa-solid fa-house"></i> Main Site</a>
                <button class="docs-hamburger"><i class="fa-solid fa-bars"></i> Menu</button>
            </nav>
        </div>
    </header>

    <!-- Struktura Dokumentacji -->
    <div class="docs-layout">
        
        <!-- Pasek boczny (Wersje, Szukajka, Nawigacja) -->
        <aside class="docs-sidebar" id="docs-sidebar">
            <div class="version-selector-wrap">
                <label for="version-select">Documentation Version</label>
                <select id="version-select" class="version-select">
                    <!-- Opcje generowane przez JS -->
                </select>
            </div>
            
            <div class="docs-search-wrap">
                <div class="search-input-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="docs-search-input" placeholder="Search docs..." autocomplete="off">
                </div>
                <div class="search-results" id="search-results">
                    <!-- Wyniki wyszukiwania -->
                </div>
            </div>
            
            <nav class="docs-nav" id="docs-nav">
                <!-- Menu generowane przez JS -->
            </nav>
        </aside>

        <!-- Główny obszar zawartości -->
        <main class="docs-main">
            <div class="docs-breadcrumbs" id="docs-breadcrumbs">
                <!-- Ścieżka (Breadcrumbs) -->
            </div>
            
            <div id="docs-content" class="docs-content-formatted">
                <!-- Tu wpadnie zawartość z plików z folderu pages -->
                <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading content...</div>
            </div>
            
            <!-- Nawigacja dół -->
            <div class="docs-footer-nav" id="docs-footer-nav">
                <button id="btn-prev" class="btn btn-outline dark"><i class="fa-solid fa-arrow-left"></i> Previous</button>
                <button id="btn-next" class="btn btn-primary">Next <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </main>
    </div>

    <script src="docs-config.js"></script>
    <script src="docscript.js"></script>
</body>
</html>
