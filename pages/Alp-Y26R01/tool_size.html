<h1>Brush Size</h1>
<p>The <code>Pen</code> and <code>Eraser</code> tools allow you to adjust the thickness of drawing or erasing. This lets you precisely control how thick your strokes are.</p>

<div class="callout callout-danger">
    <span class="callout-title">Limits</span>
    <p>The minimum size is 1, and the maximum is 64.</p>
</div>
