<h1>Inventory</h1>
<p>The inventory contains the blocks you can use for painting. To open it, use the <code>Inventory</code> button.</p>

<div class="callout callout-tip">
    <span class="callout-title">Easier Block Finding</span>
    <p>You can quickly find the blocks you need by using categories or the search function by block name.</p>
</div>
