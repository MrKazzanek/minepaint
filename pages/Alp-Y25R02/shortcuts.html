<h1>Keyboard Shortcuts</h1>
<p>Below are useful keyboard shortcuts that improve your workflow with the program:</p>
<table>
  <thead>
        <tr>
            <th>Shortcut</th>
            <th>Action</th>
        </tr>
    </thead>
  <tbody>
    <tr>
        <td><kbd>ESC</kbd></td>
        <td>Closes the open inventory or the blockstates inventory panel.</td>   
    </tr>
    <tr>
        <td><kbd>F2</kbd></td>
        <td>Takes a screenshot of the entire program and saves it in the <code>C:\Users\[Username]\Pictures\Screenshots</code> folder.</td>   
    </tr>
  </tbody>
</table>
