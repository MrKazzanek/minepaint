<h1>Erasing</h1>
<p>To erase, you need to select the <code>Eraser</code> or <code>Pen</code> tool from the toolbar.</p>
<p><kbd>Right Mouse Button</kbd> or <kbd>Left Mouse Button</kbd> – use to remove blocks when the <code>Eraser</code> tool is selected.</p>
<p><kbd>Right Mouse Button</kbd> – use to remove blocks when the <code>Pen</code> tool is selected.</p>
