<h1>Clearing the Canvas</h1>
<p>The <code>Clear</code> button is used to erase the entire canvas. After clicking it, a confirmation window will appear asking you to confirm the action.</p>

<div class="callout callout-danger">
    <span class="callout-title">Warning!</span>
    <p>The canvas clearing operation cannot be undone!</p>
</div>
